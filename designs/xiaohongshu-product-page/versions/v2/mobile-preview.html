<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MonoList 商品图手机预览</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 28px 16px 60px; color: #242421; background: #d9d6d0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
    header { width: min(920px, 100%); margin: 0 auto 24px; }
    header h1 { margin: 0 0 7px; font-size: 22px; }
    header p { margin: 0; color: #74716b; font-size: 13px; }
    main { width: min(980px, 100%); margin: 0 auto; display: grid; grid-template-columns: 280px 390px; gap: 34px; align-items: start; }
    section { display: grid; gap: 12px; }
    h2 { margin: 0; color: #6e6b65; font-size: 12px; }
    .thumb { width: 64px; height: 64px; overflow: hidden; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,.15); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .product-mount { padding: 12px; display: flex; align-items: center; gap: 12px; border-radius: 16px; background: #f5f3ee; box-shadow: 0 12px 32px rgba(0,0,0,.09); }
    .product-copy { min-width: 0; display: grid; gap: 5px; }
    .product-copy strong { overflow: hidden; font-size: 13px; text-overflow: ellipsis; white-space: nowrap; }
    .product-copy span { color: #8a877f; font-size: 11px; }
    .square-check { width: 220px; overflow: hidden; border-radius: 22px; box-shadow: 0 18px 42px rgba(0,0,0,.14); }
    .square-check img { width: 100%; display: block; }
    .phone { padding: 10px; border-radius: 30px; background: #1f1f1d; box-shadow: 0 26px 60px rgba(0,0,0,.22); }
    .phone-inner { height: 760px; overflow-y: auto; border-radius: 22px; background: white; scroll-snap-type: y proximity; }
    .phone img { width: 100%; display: block; scroll-snap-align: start; }
    .carousel-note { padding: 13px; color: #77736d; background: #f5f3ee; font-size: 11px; }
    @media (max-width: 720px) { main { grid-template-columns: 1fr; } .phone { width: min(390px, 100%); } }
  </style>
</head>
<body>
  <header><h1>MonoList · 手机端验收</h1><p>左侧检查购物车约 64px 主图，右侧按 390px 商品页宽度检查轮播文字。</p></header>
  <main>
    <section><h2>商品挂载组件 · 64px 实际缩略图</h2><div class="product-mount"><div class="thumb"><img src="exports/01-1x1.png" alt="商品主图"></div><div class="product-copy"><strong>MonoList 菜单栏待办工具</strong><span>随手记 · 轻提醒 · 本地保存</span></div></div><h2>1:1 原图布局检查</h2><div class="square-check"><img src="exports/01-1x1.png" alt="商品主图原图"></div></section>
    <section><h2>轮播与详情</h2><div class="phone"><div class="phone-inner"><img src="exports/01-3x4.png" alt="01"><img src="exports/02.png" alt="02"><img src="exports/03.png" alt="03"><img src="exports/04.png" alt="04"><img src="exports/05.png" alt="05"><img src="exports/06.png" alt="06"><img src="exports/07.png" alt="07"><img src="exports/08.png" alt="08"><img src="exports/09.png" alt="09"><div class="carousel-note">继续下滑查看长详情页</div><img src="exports/10.png" alt="长详情页"></div></div></section>
  </main>
</body>
</html>
